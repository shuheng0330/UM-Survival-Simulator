<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UM Survival Simulator</title>
<style>
/* ─── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

/* ─── CSS Variables ─────────────────────────────────────────── */
:root {
  --bg-dark: #0d0d1a;
  --panel-bg: rgba(15, 15, 35, 0.88);
  --panel-border: rgba(255,255,255,0.08);
  --text-primary: #f0f0f5;
  --text-muted: #8888aa;
  --accent: #c8932a;
  --gpa-color: #4a9eff;
  --stress-color: #ff5252;
  --energy-color: #4caf50;
  --money-color: #ffd700;
  --social-color: #b06dff;
  --btn-primary: #3a2510;
  --btn-primary-h: #5a3a18;
  --btn-primary-p: #1e1008;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --transition: 0.3s ease;
}

/* ─── Screen Container ────────────────────────────────────── */
.screen {
  position: absolute; inset: 0;
  display: none;
  background-color: var(--bg-dark);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.screen.active { display: flex; align-items: center; justify-content: center; }

/* ─── Background image slots ─────────────────────────────── */
#screen-menu    { background-image: url('assets/icons/MainMenu.png'); }
#screen-character { background-image: linear-gradient(135deg,#0a0a1f 0%,#1a1040 100%); }
#screen-intro   { background-image: linear-gradient(135deg,#0d1020 0%,#1a2040 100%); }
#screen-ending  { background-image: url('assets/icons/EndingScreen.png'); }
/* Fallback overlays for screens with background images */
#screen-menu::before, #screen-ending::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(0,0,0,0.25);
}
#screen-menu > *, #screen-ending > * { position: relative; z-index: 1; }

/* ─── Panel ──────────────────────────────────────────────── */
.panel {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-primary);
}

/* ─── Buttons ────────────────────────────────────────────── */
.btn {
  display: block; width: 100%;
  padding: 12px 24px;
  border: none; border-radius: var(--radius-sm);
  background: var(--btn-primary);
  color: #fff; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: background var(--transition);
  text-align: center;
}
.btn:hover  { background: var(--btn-primary-h); }
.btn:active { background: var(--btn-primary-p); }
.btn:disabled { background: #222; color: #555; cursor: not-allowed; }
.btn + .btn { margin-top: 12px; }
.btn-row { display: flex; gap: 12px; margin-top: 16px; }
.btn-row .btn { margin-top: 0; }
.btn-outline {
  background: transparent;
  border: 1px solid var(--panel-border);
  color: var(--text-muted);
}
.btn-outline:hover { background: rgba(255,255,255,0.06); }

/* ─── Main Menu ──────────────────────────────────────────── */
.menu-panel { width: 280px; text-align: center; }
.menu-panel h1 { font-size: 22px; color: var(--text-primary); margin-bottom: 8px; }
.menu-panel p  { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }

/* ─── Character Creation ─────────────────────────────────── */
.char-panel { width: 480px; max-height: 90vh; overflow-y: auto; }
.char-panel h2 { font-size: 22px; margin-bottom: 24px; color: var(--accent); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
.form-group input,
.form-group select {
  width: 100%; padding: 10px 14px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  color: var(--text-primary); font-size: 14px;
  outline: none; transition: border-color var(--transition);
}
.form-group input:focus,
.form-group select:focus { border-color: var(--accent); }
.form-group select option { background: #1a1a30; }

/* ─── Intro Screen ───────────────────────────────────────── */
.intro-panel { width: 560px; text-align: center; }
.intro-panel .intro-text { font-size: 17px; line-height: 1.8; color: var(--text-primary); margin-bottom: 28px; }
.intro-panel .welcome-name { color: var(--accent); font-weight: 700; }

/* ─── Game Screen ────────────────────────────────────────── */
#screen-game {
  display: none; flex-direction: column;
  background: linear-gradient(180deg, #0d0d1a 0%, #12121f 100%);
  overflow: hidden;
}
#screen-game.active { display: flex; }

.game-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: rgba(0,0,0,0.4);
  border-bottom: 1px solid var(--panel-border);
  flex-shrink: 0;
}
.week-badge {
  background: var(--accent); color: #000;
  padding: 4px 14px; border-radius: 20px;
  font-weight: 700; font-size: 14px;
}
.header-title { font-size: 15px; color: var(--text-muted); }
.header-btns { display: flex; gap: 8px; }
.header-btns button {
  padding: 6px 14px;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.06);
  color: var(--text-primary); font-size: 13px;
  cursor: pointer; transition: background var(--transition);
}
.header-btns button:hover { background: rgba(255,255,255,0.12); }

/* Stats Bar */
.stats-bar {
  display: flex; gap: 12px; padding: 10px 20px;
  background: rgba(0,0,0,0.3); flex-shrink: 0;
  border-bottom: 1px solid var(--panel-border);
}
.stat-item { flex: 1; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.stat-track {
  height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.1); overflow: hidden;
}
.stat-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.stat-val { font-size: 12px; margin-top: 2px; color: var(--text-primary); font-weight: 600; }

/* Location Grid */
.game-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.location-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-bottom: 16px;
}
.loc-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 14px 10px; text-align: center;
  cursor: pointer; transition: all var(--transition);
  position: relative;
}
.loc-card:hover:not(.done):not(.disabled) {
  background: rgba(200,147,42,0.12);
  border-color: rgba(200,147,42,0.4);
}
.loc-card.done {
  opacity: 0.45; cursor: not-allowed;
}
.loc-card.done::after {
  content: '✓'; position: absolute; top: 6px; right: 8px;
  color: #4caf50; font-size: 14px; font-weight: 700;
}
.loc-icon { font-size: 26px; margin-bottom: 6px; }
.loc-name { font-size: 12px; color: var(--text-primary); font-weight: 600; }

.game-footer {
  padding: 12px 20px;
  background: rgba(0,0,0,0.3);
  border-top: 1px solid var(--panel-border);
  display: flex; justify-content: flex-end; flex-shrink: 0;
}

/* ─── Event Modal ────────────────────────────────────────── */
#event-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  z-index: 100;
}
#event-overlay.active { display: flex; }
.event-modal {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  padding: 28px; width: 480px; max-width: 92vw;
  box-shadow: var(--shadow);
  backdrop-filter: blur(16px);
}
.event-title { font-size: 14px; color: var(--accent); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.event-body  { font-size: 15px; color: var(--text-primary); line-height: 1.65; margin-bottom: 20px; white-space: pre-line; }
.event-btns  { display: flex; flex-direction: column; gap: 10px; }

/* ─── Ending Screen ──────────────────────────────────────── */
.ending-panel { width: 500px; text-align: center; }
.ending-result { font-size: 26px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.ending-flavor { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
.ending-stats {
  background: rgba(255,255,255,0.05);
  border-radius: var(--radius-sm); padding: 16px;
  text-align: left; margin-bottom: 24px;
  font-size: 14px; line-height: 2; color: var(--text-primary);
}
.stat-row { display: flex; justify-content: space-between; }
.stat-row span:last-child { color: var(--accent); font-weight: 700; }

/* ─── Scrollbar ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* ─── Responsive ─────────────────────────────────────────── */
@media (max-width: 520px) {
  .char-panel { width: 95vw; padding: 20px; }
  .ending-panel { width: 92vw; }
  .location-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-bar { flex-wrap: wrap; }
  .stat-item { min-width: 45%; }
}
</style>
</head>

<!-- ═══════════════════════════════════════════ MAIN MENU -->
<div id="screen-menu" class="screen active">

    <h1>UM Survival Simulator</h1>
    <p>A University of Malaya Experience</p>
    <button class="btn" onclick="showScreen('character')">Play</button>
    <button class="btn btn-outline" onclick="window.close()">Quit</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ CHARACTER CREATION -->
<div id="screen-character" class="screen">

      <label>Your Name</label>

    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="number" id="inp-age" value="21" min="17" max="30">
    </div>
    <div class="form-group">
      <label>Major</label>
      <select id="inp-major">
        <option value="">— Select Major —</option>
        <option>Software Engineering</option>
        <option>Medicine</option>
        <option>Business and Economics</option>
        <option>Law</option>
        <option>Education</option>
      </select>
    </div>
    <div class="form-group">
      <label>Kolej Kediaman</label>
      <select id="inp-kolej">
        <option value="">— Select Kolej —</option>
        <option>KK1</option><option>KK2</option>
        <option>KK7</option><option>KK8</option><option>KK12</option>
      </select>
    </div>
    <button class="btn" style="margin-top:8px" onclick="startGame()">Start Semester</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ INTRO -->
<div id="screen-intro" class="screen">
  <div class="panel intro-panel">
    <div id="intro-text" class="intro-text"></div>
    <button class="btn" onclick="showScreen('game')">Begin Journey</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ GAME -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <span id="week-badge" class="week-badge">Week 1</span>
    <span class="header-title" id="header-name"></span>
    <div class="header-btns">
      <button onclick="doNextWeek()">Sleep / Next Week</button>
      <button onclick="doExit()">Exit</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-label">GPA</div>
      <div class="stat-track"><div id="bar-gpa" class="stat-fill" style="background:var(--gpa-color)"></div></div>
      <div id="val-gpa" class="stat-val">3.00</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Stress</div>
      <div class="stat-track"><div id="bar-stress" class="stat-fill" style="background:var(--stress-color)"></div></div>
      <div id="val-stress" class="stat-val">20</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Energy</div>
      <div class="stat-track"><div id="bar-energy" class="stat-fill" style="background:var(--energy-color)"></div></div>
      <div id="val-energy" class="stat-val">80</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Money</div>
      <div class="stat-track"><div id="bar-money" class="stat-fill" style="background:var(--money-color)"></div></div>
      <div id="val-money" class="stat-val">100</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Social</div>
      <div class="stat-track"><div id="bar-social" class="stat-fill" style="background:var(--social-color)"></div></div>
      <div id="val-social" class="stat-val">50</div>
    </div>
  </div>

  <div class="game-body">
    <div class="location-grid">
      <div class="loc-card" id="loc-faculty" onclick="visitFaculty()">
        <div class="loc-icon">🏛️</div>
        <div class="loc-name">Faculty</div>
      </div>
      <div class="loc-card" id="loc-library" onclick="visitLibrary()">
        <div class="loc-icon">📚</div>
        <div class="loc-name">Library</div>
      </div>
      <div class="loc-card" id="loc-kolej" onclick="visitKolej()">
        <div class="loc-icon">🏠</div>
        <div class="loc-name">Kolej Kediaman</div>
      </div>
      <div class="loc-card" id="loc-cafe" onclick="visitCafe()">
        <div class="loc-icon">🍽️</div>
        <div class="loc-name">Cafeteria</div>
      </div>
      <div class="loc-card" id="loc-sports" onclick="visitSports()">
        <div class="loc-icon">🏋️</div>
        <div class="loc-name">Sports Centre</div>
      </div>
      <div class="loc-card" id="loc-club" onclick="visitClub()">
        <div class="loc-icon">🎭</div>
        <div class="loc-name">Club Room</div>
      </div>
    </div>
  </div>

  <div class="game-footer">
    <button class="btn" style="width:auto;padding:10px 28px" onclick="doNextWeek()">Sleep / Next Week →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ ENDING -->
<div id="screen-ending" class="screen">
  <div class="panel ending-panel">
    <div id="ending-result" class="ending-result"></div>
    <div id="ending-flavor" class="ending-flavor"></div>
    <div id="ending-stats" class="ending-stats"></div>
    <button class="btn" onclick="showScreen('menu'); resetGame()">Play Again</button>
    <button class="btn btn-outline" onclick="window.close()">Quit</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ EVENT OVERLAY -->
<div id="event-overlay">

    <div id="evt-body"  class="event-body"></div>

</div>

    {q:'What does SWOT analysis include?', c:'Strengths, Weaknesses, Opportunities, Threats', w:'Sales, Workload, Operations, Targets'},
    {q:'What does GDP stand for?', c:'Gross Domestic Product', w:'General Development Plan'},
    {q:'What is the purpose of a balance sheet?', c:'Show assets, liabilities and equity', w:'Track daily sales performance'},
    {q:'What is inflation?', c:'A rise in the general price level', w:'A fall in the unemployment rate'},
    {q:'What does the marketing mix refer to?', c:'Product, Price, Place, Promotion', w:'Market, Margins, Media, Money'},
  ],
  'Law': [
    {q:'What is a contract?', c:'A legally enforceable agreement', w:'A casual promise only'},
    {q:"What is a 'tort'?", c:'A civil wrong causing harm to another', w:'A criminal offence against the state'},
    {q:'What does habeas corpus protect?', c:'Right to be brought before a court', w:'Right to own property'},
    {q:'What is the purpose of criminal law?', c:'Punish those who harm society', w:'Resolve disputes between individuals'},
    {q:"What is 'precedent' in law?", c:'A prior case used as a rule for future cases', w:'A written law passed by Parliament'},
  ],
  'Education': [
    {q:'What is pedagogy?', c:'The method and practice of teaching', w:'A school building'},
    {q:"What is Bloom's Taxonomy?", c:'A framework for classifying learning objectives', w:'A school grading system'},
    {q:'What does IEP stand for?', c:'Individualized Education Program', w:'Integrated Educational Policy'},
    {q:'What is formative assessment?', c:'Ongoing assessment to monitor learning progress', w:'Final exam at end of semester'},
    {q:'Which approach involves student-led inquiry?', c:'Constructivism', w:'Direct instruction'},
  ],
}

const CLUB_EVENTS = {
  'Badminton Club': [
    'Badminton Club:\nWeekly training session at the sports hall.',
    'Badminton Club:\nInter-faculty tournament coming up!',
    'Badminton Club:\nFinal practice before semester ends.',
  ],
  'Board Game Club': [
    'Board Game Club:\nWeekly game night session.',
    'Board Game Club:\nClub tournament event this week.',
    'Board Game Club:\nEnd-of-semester board game marathon.',
  ],
  'Basketball Club': [
    'Basketball Club:\nTraining drills at the court.',
    'Basketball Club:\nFriendly match against another faculty.',
    'Basketball Club:\nFinal season game this week.',
  ],
  'Singing Club': [
    'Singing Club:\nVocal practice session with the group.',
    'Singing Club:\nPreparing for the mid-semester showcase.',
    'Singing Club:\nFinal rehearsal before semester concert.',
  ],
}

const CLUB_JOIN_BTN = {
  'Badminton Club':'Join Training', 'Board Game Club':'Join Game Night',
  'Basketball Club':'Join Practice', 'Singing Club':'Join Rehearsal',
}

const ENDINGS = [
  { id:'gym_freak', check:()=>S.sportsVisits>=8,        title:'Gym Freak!', flavor:'You hit the Sports Centre almost every week!\nYour dedication to fitness made you a campus legend.' },
  { id:'celebrity', check:()=>S.social>90,              title:'Campus Celebrity!', flavor:'Your social life was unmatched.\nEveryone on campus knows your name!' },
  { id:'millionaire',check:()=>S.money>150,             title:'Millionaire Student!', flavor:'You managed your finances brilliantly.\nRicher than most graduates at the end of semester!' },
  { id:'dean_list', check:()=>S.gpa>=3.7&&S.stress<=50, title:'Dean List Survivor!', flavor:'You balanced study and wellbeing perfectly.\nCongratulations on an outstanding semester!' },
  { id:'burnout',   check:()=>S.stress>=80,             title:'Burnout Ending', flavor:'You studied hard, but stress took its toll.\nRemember to take breaks next time.' },
  { id:'probation', check:()=>S.gpa<2.0,                title:'Academic Probation', flavor:'Your grades dropped too low.\nBetter planning is needed next semester.' },
  { id:'balanced',  check:()=>true,                     title:'Balanced Student', flavor:'You completed the semester with acceptable performance.\nNot bad – but you can do better!' },
]

// ═══════════════════════════════ UTILITY

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function applyDelta(d) {
  S.gpa    = clamp(parseFloat((S.gpa    + (d[0]||0)).toFixed(2)), 0, 4);
  S.stress = clamp(Math.round(S.stress  + (d[1]||0)), 0, 100);
  S.energy = clamp(Math.round(S.energy  + (d[2]||0)), 0, 100);
  S.social = clamp(Math.round(S.social  + (d[3]||0)), 0, 100);
  S.money  = clamp(Math.round(S.money   + (d[4]||0)), -50, 200);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById('screen-'+id).classList.add('active')
}

function showEvent(title, body, btns) {
  // btns = [{label, cb, outline}]
  document.getElementById('evt-title').textContent = title
  document.getElementById('evt-body').textContent  = body
  const el = document.getElementById('evt-btns')
  el.innerHTML = ''
  btns.forEach(b => {
    const btn = document.createElement('button')
    btn.className = 'btn' + (b.outline ? ' btn-outline' : '')
    btn.textContent = b.label
    btn.onclick = () => { closeEvent(); b.cb(); }
    el.appendChild(btn)
  })
  document.getElementById('event-overlay').classList.add('active')
}

function closeEvent() {
  document.getElementById('event-overlay').classList.remove('active')
}

function showMessage(title, body, onOk) {
  showEvent(title, body, [{ label:'OK', cb: onOk || (()=>{}) }])
}

// ═══════════════════════════════ STATS UI

function updateStats() {
  document.getElementById('week-badge').textContent = 'Week ' + S.week
  document.getElementById('bar-gpa').style.width    = (S.gpa/4*100)+'%'
  document.getElementById('bar-stress').style.width = S.stress+'%'
  document.getElementById('bar-energy').style.width = S.energy+'%'
  document.getElementById('bar-money').style.width  = clamp((S.money+50)/250*100,0,100)+'%'
  document.getElementById('bar-social').style.width = S.social+'%'
  document.getElementById('val-gpa').textContent    = S.gpa.toFixed(2)
  document.getElementById('val-stress').textContent = S.stress
  document.getElementById('val-energy').textContent = S.energy
  document.getElementById('val-money').textContent  = S.money
  document.getElementById('val-social').textContent = S.social

  // Update location card done state
  const map = {faculty:'faculty', library:'library', kolej:'kolej', cafe:'cafe', sports:'sports', club:'club'}
  Object.entries(map).forEach(([k,id]) => {
    document.getElementById('loc-'+id).classList.toggle('done', S.done[k])
  })

  checkGameOver()
}

// ═══════════════════════════════ GAME OVER

function checkGameOver() {
  if (S.stress >= 100) { endGameOver("Your stress reached a dangerous level.\nYou need better balance next semester."); return; }
  if (S.energy <= 0)   { endGameOver("You are too exhausted to continue the semester."); return; }
  if (S.money <= -50)  { endGameOver("You ran into serious financial trouble."); return; }
  if (S.gpa <= 2.0 && S.week > 1) { endGameOver("Your academic performance dropped too low."); return; }
}

function endGameOver(msg) {
  showMessage('Game Over', msg, () => { showScreen('menu'); resetGame(); })
}

// ═══════════════════════════════ LOCATIONS

function visitFaculty() {
  if (S.done.faculty) return
  const w = S.week
  const evts = FACULTY_EVENTS[S.major] || {}
  const body = evts[w] || 'General university lecture week.'
  const btns = FACULTY_BTNS[w] || ['Focus in Class', 'Just Attend']
  showEvent('Faculty', body, [
    { label: btns[0], cb: () => {
        applyDelta(FACULTY_GOOD[w] || [0.1,0,-5,0,0])
        S.done.faculty = true; updateStats()
    }},
    { label: btns[1], cb: () => {
        applyDelta(FACULTY_BAD[w]  || [-0.1,3,0,0,0])
        S.done.faculty = true; updateStats()
    }, outline: true },
  ])
}

function visitLibrary() {
  if (S.done.library) return
  showEvent('Library', 'You found a quiet study space.', [
    { label:'Study Here', cb:() => { applyDelta([0.3,3,-10,0,0]); S.done.library=true; updateStats() }},
    { label:'Leave and Rest', cb:() => { applyDelta([-0.1,0,10,0,0]); S.done.library=true; updateStats() }, outline:true },
  ])
}

function visitKolej() {
  if (S.done.kolej) return
  showEvent('Kolej Kediaman', 'You returned to your room after a tiring day.', [
    { label:'Sleep Early',    cb:() => { applyDelta([0,-10,20,0,0]); S.done.kolej=true; updateStats() }},
    { label:'Stay Up Gaming', cb:() => { applyDelta([-0.1,-10,-5,0,0]); S.done.kolej=true; updateStats() }, outline:true },
  ])
}

function visitCafe() {
  if (S.done.cafe) return
  showEvent('Cafeteria', 'You feel hungry after class.', [
    { label:'Buy Meal',  cb:() => { applyDelta([0,-3,15,0,-10]); S.done.cafe=true; updateStats() }},
    { label:'Skip Meal', cb:() => { applyDelta([0,5,-10,0,0]); S.done.cafe=true; updateStats() }, outline:true },
  ])
}

function visitSports() {
  if (S.done.sports) return
  const w = S.week
  let body, joinBtn
  if (w<=3)       { body='A morning jog around campus would do you good.';   joinBtn='Go for a Jog' }
  else if (w<=6)  { body='The gym is open for a workout session.';            joinBtn='Hit the Gym' }
  else if (w<=9)  { body='The swimming pool is free this afternoon.';         joinBtn='Swim Some Laps' }
  else            { body='A yoga and stretching class is on today.';          joinBtn='Join Yoga Class' }
  showEvent('Sports Centre', body, [
    { label: joinBtn, cb:() => { applyDelta([0,-12,-8,8,0]); S.sportsVisits++; S.done.sports=true; updateStats() }},
    { label:'Skip Exercise', cb:() => { applyDelta([0,5,5,-3,0]); S.done.sports=true; updateStats() }, outline:true },
  ])
}

function visitClub() {
  if (S.done.club) return
  if (S.week === 1) {
    // Club selection
    showEvent('Club Room', 'Choose a club to join for the semester!', [
      { label:'Badminton Club',  cb:()=>{ S.club='Badminton Club';  S.done.club=true; updateStats() }},
      { label:'Board Game Club', cb:()=>{ S.club='Board Game Club'; S.done.club=true; updateStats() }},
      { label:'Basketball Club', cb:()=>{ S.club='Basketball Club'; S.done.club=true; updateStats() }},
      { label:'Singing Club',    cb:()=>{ S.club='Singing Club';    S.done.club=true; updateStats() }},
    ])
  } else {
    const club  = S.club
    const phase = S.week<=4 ? 0 : S.week<=8 ? 1 : 2
    const evts  = CLUB_EVENTS[club]
    const body  = evts ? evts[phase] : 'Club Room:\nThere is a club activity today.'
    const join  = club ? (CLUB_JOIN_BTN[club]||'Join Activity') : 'Join Club Activity'
    showEvent('Club Room', body||'Club activity today.', [
      { label: join, cb:() => { applyDelta([-0.1,-8,-8,15,0]); S.done.club=true; updateStats() }},
      { label:'Focus on Study Instead', cb:()=>{ applyDelta([0.2,3,0,-5,0]); S.done.club=true; updateStats() }, outline:true },
    ])
  }
}

// ═══════════════════════════════ NEXT WEEK / RANDOM EVENT

function doNextWeek() {
  if (S.week >= 14) { showEnding(); return; }
  S.week++
  S.done = { faculty:false, library:false, kolej:false, cafe:false, sports:false, club:false }
  updateStats()
  if (S.week === 14) { showExam(); return; }
  if (Math.random() < 0.4) {
    const ev = RANDOM_EVENTS[Math.floor(Math.random()*10)]
    applyDelta(ev.d)
    updateStats()
    showMessage('Random Event', ev.msg)
  }
}

// ═══════════════════════════════ EXAM

function showExam() {
  S.exam.qs    = (EXAM_QUESTIONS[S.major] || []).slice()
  S.exam.idx   = 0
  S.exam.score = 0
  S.exam.active= true
  showExamQuestion()
}

function showExamQuestion() {
  if (!S.exam.active) return
  const q = S.exam.qs[S.exam.idx]
  showEvent(
    `Final Exam (Question ${S.exam.idx+1}/5)`,
    q.q,
    [
      { label: q.c, cb: () => { S.exam.score++; advanceExam() }},
      { label: q.w, cb: () => {                  advanceExam() }, outline:true },
    ]
  )
}

function advanceExam() {
  S.exam.idx++
  if (S.exam.idx >= 5) {
    // Apply GPA based on score
    const tbl = {5:0.5,4:0.3,3:0.1,2:-0.1,1:-0.2,0:-0.4}
    applyDelta([tbl[S.exam.score]||0, 0,0,0,0])
    S.exam.active = false
    updateStats()
    showEnding()
  } else {
    showExamQuestion()
  }
}

// ═══════════════════════════════ ENDING

function showEnding() {
  const e = ENDINGS.find(en => en.check())
  document.getElementById('ending-result').textContent = e.title
  document.getElementById('ending-flavor').textContent = e.flavor
  document.getElementById('ending-stats').innerHTML =
    `<div class="stat-row"><span>GPA</span><span>${S.gpa.toFixed(2)}</span></div>` +
    `<div class="stat-row"><span>Stress</span><span>${S.stress}</span></div>` +
    `<div class="stat-row"><span>Energy</span><span>${S.energy}</span></div>` +
    `<div class="stat-row"><span>Money</span><span>${S.money}</span></div>` +
    `<div class="stat-row"><span>Social</span><span>${S.social}</span></div>` +
    `<div class="stat-row"><span>Exam Score</span><span>${S.exam.score}/5</span></div>` +
    `<div class="stat-row"><span>Sports Visits</span><span>${S.sportsVisits}</span></div>`
  showScreen('ending')
}

// ═══════════════════════════════ EXIT PROMPT

function doExit() {
  showEvent('Exit Game', 'Do you want to save your progress before exiting?', [
    { label:'Save & Exit', cb:() => {
        localStorage.setItem('umSurvivalSave', JSON.stringify({...S}))
        showMessage('Saved', 'Progress saved!', () => { showScreen('menu'); resetGame() })
    }},
    { label:'Cancel', cb:()=>{}, outline:true },
  ])
}

// ═══════════════════════════════ CHARACTER CREATION / INIT

function startGame() {
  const name  = document.getElementById('inp-name').value.trim()
  const major = document.getElementById('inp-major').value
  const kolej = document.getElementById('inp-kolej').value
  if (!name)  { alert('Please enter your name.'); return }
  if (!major) { alert('Please select a major.');  return }
  if (!kolej) { alert('Please select a Kolej.');  return }
  S.name = name; S.major = major; S.kolej = kolej
  document.getElementById('header-name').textContent = name + ' · ' + major
  document.getElementById('intro-text').innerHTML =
    `Welcome, <span class="welcome-name">${name}</span>, to University Malaya.\n\nCongratulations on entering ${major}.\n\nYour semester journey begins now...`
  showScreen('intro')
}

function resetGame() {
  Object.assign(S, {
    name:'', major:'', kolej:'', club:'',
    gpa:3.0, stress:20, energy:80, money:100, social:50,
    week:1, sportsVisits:0,
    done:{ faculty:false, library:false, kolej:false, cafe:false, sports:false, club:false },
    exam:{ active:false, idx:0, score:0, qs:[] },
  })
  document.getElementById('inp-name').value = ''
  document.getElementById('inp-major').value = ''
  document.getElementById('inp-kolej').value = ''
}

// Init
updateStats()
</script>
